  <script>
    // URL Base64文字列をUint8Arrayに変換する関数
    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }

    // Flutterから呼ばれるプッシュ購読関数
    window.subscribeToPush = async function(vapidPublicKey) {
      try {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
          console.warn('Push API is not supported');
          return null;
        }

        // カスタム Service Worker を登録
        const registration = await navigator.serviceWorker.register('/push_sw.js');
        console.log('Push SW registered scope:', registration.scope);

        await navigator.serviceWorker.ready;

        let subscription = await registration.pushManager.getSubscription();
        if (!subscription) {
          const applicationServerKey = urlBase64ToUint8Array(vapidPublicKey);
          subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: applicationServerKey
          });
          console.log('New Push Subscription created.');
        } else {
          console.log('Existing Push Subscription found.');
        }
        
        return JSON.stringify(subscription);
      } catch (e) {
        console.error('Error subscribing to push:', e);
        return null;
      }
    };
  </script>
