name: sleep_routine_app
description: "睡眠・ルーティン習慣化アプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Icons
  cupertino_icons: ^1.0.8

  # Local Storage
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Local DB
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.0

  # Navigation
  go_router: ^14.2.0

  # HTTP Client
  http: ^1.2.2

  # UI Components
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # AI Integration
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
